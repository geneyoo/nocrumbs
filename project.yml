name: NoCrumbs
options:
  bundleIdPrefix: com.geneyoo
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: H32EKFDL92
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.0.0"

targets:
  NoCrumbs:
    type: application
    platform: macOS
    sources:
      - path: NoCrumbs/App
      - path: NoCrumbs/Core
        excludes:
          - "**/.gitkeep"
      - path: NoCrumbs/Features
        excludes:
          - "**/.gitkeep"
      - path: NoCrumbs/UI
        excludes:
          - "**/.gitkeep"
    resources:
      - path: NoCrumbs/Resources
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.geneyoo.nocrumbs
        INFOPLIST_FILE: NoCrumbs/Resources/Info.plist
        PRODUCT_NAME: NoCrumbs
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_HARDENED_RUNTIME: false
        OTHER_LDFLAGS: "-lsqlite3"

  NoCrumbsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NoCrumbs/Tests
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: NoCrumbs
