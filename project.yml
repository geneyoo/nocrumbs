name: NoCrumbs
options:
  bundleIdPrefix: com.geneyoo
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: H32EKFDL92
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.0.0"

targets:
  NoCrumbs:
    type: application
    platform: macOS
    sources:
      - path: NoCrumbs/App
      - path: NoCrumbs/Core
        excludes:
          - "**/.gitkeep"
      - path: NoCrumbs/Features
        excludes:
          - "**/.gitkeep"
      - path: NoCrumbs/UI
        excludes:
          - "**/.gitkeep"
    resources:
      - path: NoCrumbs/Resources
    dependencies:
      - package: Sparkle
    postBuildScripts:
      - name: "Build & Embed CLI"
        script: |
          # Sync version from VERSION file to CLI Version.swift + Info.plist
          "${SRCROOT}/scripts/sync-version.sh"

          if [ "$NOCRUMBS_SKIP_CLI" = "1" ] || [ "$CI" = "true" ]; then
            echo "Skipping CLI build (NOCRUMBS_SKIP_CLI=1)"
            exit 0
          fi
          CLI_DIR="${SRCROOT}/CLI"
          if [ ! -d "$CLI_DIR" ]; then
            echo "warning: CLI directory not found at $CLI_DIR — skipping CLI embed"
            exit 0
          fi
          echo "Building CLI..."
          swift build -c release --package-path "$CLI_DIR" --arch arm64 --arch x86_64 --disable-sandbox 2>&1 | grep -v __preview || true
          CLI_BIN="$CLI_DIR/.build/apple/Products/Release/nocrumbs"
          if [ ! -f "$CLI_BIN" ]; then
            echo "error: CLI binary not found at $CLI_BIN"
            exit 1
          fi
          DEST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources"
          mkdir -p "$DEST"
          cp "$CLI_BIN" "$DEST/nocrumbs"
          echo "CLI embedded at $DEST/nocrumbs"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.geneyoo.nocrumbs
        INFOPLIST_FILE: NoCrumbs/Resources/Info.plist
        PRODUCT_NAME: NoCrumbs
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_HARDENED_RUNTIME: false
        OTHER_LDFLAGS: "-lsqlite3"

  NoCrumbsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NoCrumbs/Tests
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: NoCrumbs
