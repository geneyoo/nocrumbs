name: Bug Report
description: Report a bug in NoCrumbs
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `nocrumbs ...`
        2. Open menu bar app
        3. Click on ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. 14.5"
    validations:
      required: true
  - type: input
    id: nocrumbs-version
    attributes:
      label: NoCrumbs version
      placeholder: "e.g. 0.1.0 or commit hash"
    validations:
      required: true
  - type: dropdown
    id: vcs
    attributes:
      label: VCS
      options:
        - Git
        - Mercurial (Jujutsu)
        - Sapling
    validations:
      required: true
